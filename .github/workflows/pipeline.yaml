name: pipeline

on:
  push:
    branches:
      - '**'
  pull_request: {}

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run prettier:check
      - run: npm run package:check

  commit-dist:
    needs: checks
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'renovate/') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.actor == github.repository_owner || github.actor == 'renovate-mike[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci && npm run build && npm run package
      - name: Commit rebuilt dist
        run: |
          git config user.name "Mike Penz"
          git config user.email "opensource-bot@mikepenz.dev"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: rebuild dist for renovate"
          git push https://x-access-token:${{ secrets.RENOVATE_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.event.pull_request.head.ref }}

  integration-tests:
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      contents: read
      deployments: write
    strategy:
      matrix:
        scenario: [ 'success', 'failure' ]
        include:
          - scenario: 'success'
            exit_code: 0
          - scenario: 'failure'
            exit_code: 1
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build && npm run package

      - name: extract branch name
        id: get_branch
        shell: bash
        run: echo "branch=$(echo ${GITHUB_REF#refs/heads/} | tr / -)" >> "$GITHUB_OUTPUT"

      - name: start deployment
        uses: ./
        id: deployment
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: integration-test-${{ steps.get_branch.outputs.branch }}-${{ matrix.scenario }}
          desc: 'Deployment starting!'
          debug: true

      - name: parse repo name and owner
        id: parse_repo
        shell: bash
        run: |
          echo "owner=$(cut -d "/" -f 1 <<<"${{ github.repository }}")" >> "$GITHUB_OUTPUT"
          echo "name=$(cut -d "/" -f 2 <<<"${{ github.repository }}")" >> "$GITHUB_OUTPUT"

      - name: assert deployment in progress
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v8
        env:
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          status_id: ${{ steps.deployment.outputs.status_id }}
        with:
          script: |
            const { deployment_id, status_id } = process.env;
            if (!deployment_id) {
              throw new Error("deployment_id not set");
            }
            if (!status_id) {
              throw new Error("status_id not set");
            }
            const res = await github.rest.repos.getDeploymentStatus({
              owner: "${{ steps.parse_repo.outputs.owner }}",
              repo: "${{ steps.parse_repo.outputs.name }}",
              deployment_id: parseInt(deployment_id, 10),
              status_id: parseInt(status_id, 10),
            });
            console.log(res)
            if (res.data.state !== "in_progress") {
              throw new Error(`unexpected status ${res.data.state}`);
            }

      - name: set deployment status to ${{ matrix.scenario }}
        uses: ./
        id: finish
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ matrix.scenario }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          env: ${{ steps.deployment.outputs.env }}
          desc: 'Deployment complete'
          debug: true

      - name: assert deployment complete
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v8
        env:
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          status_id: ${{ steps.finish.outputs.status_id }}
          expected_state: ${{ matrix.scenario }}
        with:
          script: |
            const { deployment_id, status_id, expected_state } = process.env;
            if (!deployment_id) {
              throw new Error("deployment_id not set");
            }
            if (!status_id) {
              throw new Error("status_id not set");
            }
            const res = await github.rest.repos.getDeploymentStatus({
              owner: "${{ steps.parse_repo.outputs.owner }}",
              repo: "${{ steps.parse_repo.outputs.name }}",
              deployment_id: parseInt(deployment_id, 10),
              status_id: parseInt(status_id, 10),
            });
            console.log(res)
            if (res.data.state !== expected_state) {
              throw new Error(`unexpected status ${res.data.state}`);
            }

      - name: mark environment as deactivated
        uses: ./
        with:
          step: deactivate-env
          token: ${{ secrets.GITHUB_TOKEN }}
          env: ${{ steps.deployment.outputs.env }}
          desc: Environment was pruned
          debug: true
